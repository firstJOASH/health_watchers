apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: health-watchers
  labels:
    app.kubernetes.io/name: health-watchers
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
