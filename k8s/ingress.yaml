apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: health-watchers
  namespace: health-watchers
  labels:
    app.kubernetes.io/name: health-watchers
    app.kubernetes.io/component: ingress
  annotations:
    # cert-manager: automatically provision TLS certificates
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx ingress controller settings
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.healthwatchers.example.com
      secretName: health-watchers-tls
  rules:
    - host: app.healthwatchers.example.com
      http:
        paths:
          # API routes — proxied to the API service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3001
          # Health check endpoint (no auth required)
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3001
          # Stellar service routes
          - path: /stellar
            pathType: Prefix
            backend:
              service:
                name: stellar-service
                port:
                  number: 3002
          # All other routes go to the web frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
