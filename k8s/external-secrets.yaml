# ============================================================
# External Secrets Operator (ESO) integration
#
# This file configures ESO to sync secrets from an external
# provider (e.g., AWS Secrets Manager, HashiCorp Vault, GCP
# Secret Manager) into Kubernetes Secrets.
#
# Prerequisites:
#   1. Install ESO: https://external-secrets.io/latest/introduction/getting-started/
#   2. Create a ClusterSecretStore or SecretStore pointing to your provider
#   3. Populate the secrets in your provider before applying this file
#
# Replace <your-secret-store-name> and secret paths with your actual values.
# ============================================================

# SecretStore — configure once per cluster (or use ClusterSecretStore for cross-namespace)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: health-watchers-secret-store
  namespace: health-watchers
spec:
  provider:
    # Example: AWS Secrets Manager
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        # Use IRSA (IAM Roles for Service Accounts) in production
        jwt:
          serviceAccountRef:
            name: health-watchers-sa
---
# ExternalSecret — pulls secrets from the provider and creates a Kubernetes Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: health-watchers-secrets
  namespace: health-watchers
  labels:
    app.kubernetes.io/name: health-watchers
    app.kubernetes.io/component: secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: health-watchers-secret-store
    kind: SecretStore
  target:
    name: health-watchers-secrets
    creationPolicy: Owner
  data:
    - secretKey: MONGO_URI
      remoteRef:
        key: health-watchers/production
        property: MONGO_URI
    - secretKey: JWT_ACCESS_TOKEN_SECRET
      remoteRef:
        key: health-watchers/production
        property: JWT_ACCESS_TOKEN_SECRET
    - secretKey: JWT_REFRESH_TOKEN_SECRET
      remoteRef:
        key: health-watchers/production
        property: JWT_REFRESH_TOKEN_SECRET
    - secretKey: JWT_SECRET
      remoteRef:
        key: health-watchers/production
        property: JWT_SECRET
    - secretKey: FIELD_ENCRYPTION_KEY
      remoteRef:
        key: health-watchers/production
        property: FIELD_ENCRYPTION_KEY
    - secretKey: STELLAR_SECRET_KEY
      remoteRef:
        key: health-watchers/production
        property: STELLAR_SECRET_KEY
    - secretKey: STELLAR_PUBLIC_KEY
      remoteRef:
        key: health-watchers/production
        property: STELLAR_PUBLIC_KEY
    - secretKey: STELLAR_PLATFORM_PUBLIC_KEY
      remoteRef:
        key: health-watchers/production
        property: STELLAR_PLATFORM_PUBLIC_KEY
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: health-watchers/production
        property: GEMINI_API_KEY
    - secretKey: SMTP_USER
      remoteRef:
        key: health-watchers/production
        property: SMTP_USER
    - secretKey: SMTP_PASS
      remoteRef:
        key: health-watchers/production
        property: SMTP_PASS
    - secretKey: METRICS_USERNAME
      remoteRef:
        key: health-watchers/production
        property: METRICS_USERNAME
    - secretKey: METRICS_PASSWORD
      remoteRef:
        key: health-watchers/production
        property: METRICS_PASSWORD
