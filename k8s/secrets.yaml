# ============================================================
# Kubernetes Secrets for Health Watchers
#
# WARNING: Do NOT commit real secret values to git.
# Replace all <base64-encoded-*> placeholders with actual
# base64-encoded values before applying:
#   echo -n "your-value" | base64
#
# For production, use External Secrets Operator (ESO) instead.
# See: k8s/external-secrets.yaml
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: health-watchers-secrets
  namespace: health-watchers
  labels:
    app.kubernetes.io/name: health-watchers
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # MongoDB connection URI (base64-encoded)
  MONGO_URI: <base64-encoded-mongo-uri>

  # JWT secrets (base64-encoded)
  JWT_ACCESS_TOKEN_SECRET: <base64-encoded-jwt-access-secret>
  JWT_REFRESH_TOKEN_SECRET: <base64-encoded-jwt-refresh-secret>
  JWT_SECRET: <base64-encoded-jwt-secret>

  # PHI field-level encryption key (64-char hex, base64-encoded)
  FIELD_ENCRYPTION_KEY: <base64-encoded-field-encryption-key>

  # Stellar blockchain keys (base64-encoded)
  STELLAR_SECRET_KEY: <base64-encoded-stellar-secret-key>
  STELLAR_PUBLIC_KEY: <base64-encoded-stellar-public-key>
  STELLAR_PLATFORM_PUBLIC_KEY: <base64-encoded-stellar-platform-public-key>

  # AI API key (base64-encoded)
  GEMINI_API_KEY: <base64-encoded-gemini-api-key>

  # SMTP credentials (base64-encoded)
  SMTP_USER: <base64-encoded-smtp-user>
  SMTP_PASS: <base64-encoded-smtp-pass>

  # Metrics auth (base64-encoded)
  METRICS_USERNAME: <base64-encoded-metrics-username>
  METRICS_PASSWORD: <base64-encoded-metrics-password>
