apiVersion: v1
kind: ConfigMap
metadata:
  name: health-watchers-config
  namespace: health-watchers
  labels:
    app.kubernetes.io/name: health-watchers
    app.kubernetes.io/component: config
data:
  NODE_ENV: "production"
  API_PORT: "3001"
  STELLAR_PORT: "3002"
  STELLAR_NETWORK: "mainnet"
  MAINNET_CONFIRMED: "true"
  STELLAR_DRY_RUN: "false"
  STELLAR_MAX_TRANSACTION_XLM: "1000"
  SUPPORTED_ASSETS: "XLM"
  JWT_ISSUER: "health-watchers-api"
  JWT_AUDIENCE: "health-watchers-client"
  MONGO_MAX_POOL_SIZE: "10"
  LOG_LEVEL: "info"
  MAX_REQUEST_BODY_SIZE: "10kb"
  AI_REQUEST_BODY_SIZE: "50kb"
  OTEL_SAMPLING_RATE: "0.1"
  # Internal service URLs (cluster-internal DNS)
  STELLAR_SERVICE_URL: "http://stellar-service:3002"
  API_WEBHOOK_URL: "http://api:3001/api/v1/webhooks/stellar"
  NEXT_PUBLIC_STELLAR_NETWORK: "mainnet"
  # CORS — update to your actual domain(s)
  ALLOWED_ORIGINS: "https://app.healthwatchers.example.com"
  # Socket.IO CORS — must match the web frontend origin(s)
  WEB_URL: "https://app.healthwatchers.example.com"
  # Redis URL (if using Redis for caching/rate-limiting)
  REDIS_URL: "redis://redis:6379"
