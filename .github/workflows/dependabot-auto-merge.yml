name: Dependabot Auto-merge

# Enables GitHub auto-merge for Dependabot patch updates. The PR is only merged
# once ALL required status checks (CI, Critical Vulnerability Gate, license
# compatibility) pass — auto-merge respects branch protection. Minor and major
# updates are left for manual review.
on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge patch updates
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on minor/major updates (manual review required)
        if: steps.metadata.outputs.update-type != 'version-update:semver-patch'
        run: |
          gh pr comment "$PR_URL" --body \
            "ℹ️ This is a **${{ steps.metadata.outputs.update-type }}** update and will **not** be auto-merged. A maintainer must review and merge it manually after checks pass."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
