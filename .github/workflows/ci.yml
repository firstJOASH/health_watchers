name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: 18

jobs:
  # Stage 0: Lint workflow files
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint .github/workflows/*.yml

  # Stage 1: Quality Checks (parallel)
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: [actionlint, validate-k8s]

    strategy:
      matrix:
        check: [typecheck, lint, format]
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type checking
        if: matrix.check == 'typecheck'
        run: npm run typecheck

      - name: ESLint (zero-warning policy)
        if: matrix.check == 'lint'
        run: npm run lint -- --max-warnings 0

      - name: Prettier format check
        if: matrix.check == 'format'
        run: npm run format:check

      - name: Check translations
        if: matrix.check == 'typecheck'
        run: npx ts-node scripts/check-translations.ts

      - name: Upload translation report
        if: matrix.check == 'typecheck' && always()
        uses: actions/upload-artifact@v4
        with:
          name: translation-report-${{ matrix.node-version }}
          path: scripts/translation-report.json
          retention-days: 7

  # Stage 1b: Kubernetes manifest validation (parallel)
  validate-k8s:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: [actionlint]

    steps:
      - uses: actions/checkout@v6

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate raw manifests (dry-run)
        run: |
          kubectl apply --dry-run=client -f k8s/namespace.yaml
          kubectl apply --dry-run=client -f k8s/api/
          kubectl apply --dry-run=client -f k8s/web/
          kubectl apply --dry-run=client -f k8s/stellar-service/

      - name: Assert PDB files exist for all services
        run: |
          for svc in api web stellar-service; do
            if [ ! -f "k8s/${svc}/pdb.yaml" ]; then
              echo "ERROR: missing k8s/${svc}/pdb.yaml" >&2
              exit 1
            fi
            echo "✓ k8s/${svc}/pdb.yaml present"
          done

      - name: Assert PDB minAvailable is set
        run: |
          for svc in api web stellar-service; do
            if ! grep -q "minAvailable" "k8s/${svc}/pdb.yaml"; then
              echo "ERROR: k8s/${svc}/pdb.yaml missing minAvailable" >&2
              exit 1
            fi
            echo "✓ k8s/${svc}/pdb.yaml has minAvailable"
          done

  # Stage 2: Security Scanning (parallel)
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Required gate: any CRITICAL vulnerability fails CI and blocks merge.
      - name: npm audit (fail on critical)
        run: npm audit --audit-level=critical

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Check dependency licenses
        run: |
          npx license-checker --production --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense" || echo "License check failed - review manually"
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # Stage 3: Test Suite
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [quality-checks, security-scan]

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests (unit + integration)
        run: npm test --workspace=api
        env:
          JWT_ACCESS_TOKEN_SECRET: test-access-secret-32-chars-long!!
          JWT_REFRESH_TOKEN_SECRET: test-refresh-secret-32-chars-long!
          STELLAR_NETWORK: testnet
          NODE_ENV: test
          API_PORT: 3001

      - name: Verify API security headers
        run: npm test --workspace=api -- --runInBand src/__tests__/security-headers.test.ts
        env:
          JWT_ACCESS_TOKEN_SECRET: test-access-secret-32-chars-long!!
          JWT_REFRESH_TOKEN_SECRET: test-refresh-secret-32-chars-long!
          STELLAR_NETWORK: testnet
          NODE_ENV: test
          API_PORT: 3001

      - name: Generate coverage report
        run: npm run test:coverage --workspace=api
        continue-on-error: true
        env:
          JWT_ACCESS_TOKEN_SECRET: test-access-secret-32-chars-long!!
          JWT_REFRESH_TOKEN_SECRET: test-refresh-secret-32-chars-long!
          STELLAR_NETWORK: testnet
          NODE_ENV: test
          API_PORT: 3001

      - name: Upload coverage to Codecov
        if: matrix.node-version == 18
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/api/coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Stage 4: Build
  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: [quality-checks, security-scan, test]

    strategy:
      matrix:
        app: [web, api, stellar-service]
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build ${{ matrix.app }}
        run: npm run build --workspace=${{ matrix.app }}
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_STELLAR_NETWORK: testnet

      - name: Upload build artifacts
        if: matrix.node-version == 18
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.app }}
          path: |
            apps/${{ matrix.app }}/dist
            apps/${{ matrix.app }}/.next
          retention-days: 7

  # Docker Build
  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker images
        run: docker-compose build
        env:
          DOCKER_BUILDKIT: 1

      - name: Test Docker Compose
        run: |
          docker-compose up -d
          sleep 30
          docker-compose ps
          docker-compose logs
          docker-compose down

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker images
        if: github.ref == 'refs/heads/main'
        run: |
          docker-compose push || echo "Docker push skipped - configure DOCKER_USERNAME and DOCKER_PASSWORD secrets"

  # Stage 5: E2E Tests
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Start API server
        run: npm run dev --workspace=api &
        env:
          MONGO_URI: mongodb://localhost:27017/health_watchers_e2e
          JWT_ACCESS_TOKEN_SECRET: e2e-access-secret-32-chars-long!!
          JWT_REFRESH_TOKEN_SECRET: e2e-refresh-secret-32-chars-long!
          STELLAR_NETWORK: testnet
          NODE_ENV: development
          PORT: 3001

      - name: Seed test data
        run: npm run seed || echo "Seed script not found, skipping"
        env:
          MONGO_URI: mongodb://localhost:27017/health_watchers_e2e

      - name: Start web server
        run: npm run dev --workspace=web &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_STELLAR_NETWORK: testnet

      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3001/health http://localhost:3000 --timeout 60000

      - name: Run Playwright tests
        run: npm run test:e2e --workspace=web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          E2E_DOCTOR_EMAIL: ${{ secrets.E2E_DOCTOR_EMAIL }}
          E2E_DOCTOR_PASSWORD: ${{ secrets.E2E_DOCTOR_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload test videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: apps/web/test-results/
          retention-days: 7

  # Stage 6: Deploy (main branch only)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, docker, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.health-watchers.app

    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "This is a placeholder for actual deployment"
          echo "Configure your deployment strategy:"
          echo "  - AWS: Use aws-actions/configure-aws-credentials + aws deploy"
          echo "  - Vercel: Use vercel-action"
          echo "  - Kubernetes: Use kubectl or helm"
          echo "  - Docker: Use docker-compose or docker stack deploy"

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests against staging..."
          echo "Placeholder for smoke tests"
          echo "Example: curl https://staging.health-watchers.app/health"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://health-watchers.app

    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production environment..."
          echo "This requires manual approval in GitHub Actions"
          echo "Configure your production deployment strategy"
