name: Accessibility Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  accessibility:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mongodb:
        image: mongo:6
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build applications
        run: npm run build

      - name: Start API server
        run: npm run start --workspace=api &
        env:
          MONGO_URI: mongodb://localhost:27017/health_watchers_test
          NODE_ENV: test

      - name: Start web server
        run: npm run start --workspace=web &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3000 http://localhost:3001 --timeout 60000

      - name: Run accessibility tests
        run: npm run test:a11y
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: accessibility-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: accessibility-test-results
          path: |
            accessibility-results.xml
            test-results/

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: accessibility-results.xml
          check_name: Accessibility Test Results

      - name: Fail if violations found
        if: failure()
        run: |
          echo "❌ Accessibility violations detected!"
          echo "Please fix all WCAG 2.1 AA violations before merging."
          exit 1
