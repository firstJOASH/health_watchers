global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"
  - "alerts-payments.yml"
  - "alerts-security.yml"
  - "alerts-business.yml"

scrape_configs:
  - job_name: "health-watchers-api"
    static_configs:
      - targets: ["api:3001"]
    metrics_path: /metrics
    basic_auth:
      username: "${METRICS_USERNAME}"
      password: "${METRICS_PASSWORD}"

  - job_name: "health-watchers-stellar"
    static_configs:
      - targets: ["stellar-service:3002"]
    metrics_path: /metrics
    basic_auth:
      username: "${METRICS_USERNAME}"
      password: "${METRICS_PASSWORD}"
