{{- if and .Values.stellarService.enabled .Values.stellarService.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stellar-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "health-watchers.labels" . | nindent 4 }}
    app.kubernetes.io/component: stellar-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stellar-service
  minReplicas: {{ .Values.stellarService.hpa.minReplicas }}
  maxReplicas: {{ .Values.stellarService.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.stellarService.hpa.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.stellarService.hpa.targetMemoryUtilizationPercentage }}
    - type: Pods
      pods:
        metric:
          name: stellar_payment_queue_depth
        target:
          type: AverageValue
          averageValue: {{ .Values.stellarService.hpa.paymentQueueDepthThreshold | quote }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
{{- end }}
